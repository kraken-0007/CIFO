<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Device Permission Test</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

.box{
    max-width:600px;
    margin:auto;
    background:#222;
    padding:25px;
    border-radius:20px;
}

button{
    padding:15px 30px;
    margin:10px;
    border:0;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.accept{
    background:#00c853;
    color:white;
}

video{
    width:100%;
    margin-top:20px;
    border-radius:15px;
}

#status{
    background:#000;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}

</style>

</head>


<body>


<div class="box">

<h1>🔐 اختبار صلاحيات الجهاز</h1>

<p>
هذا الاختبار يعمل على الهاتف والكمبيوتر.
</p>

<p>
بالضغط على "أوافق" سيتم طلب صلاحيات الكاميرا والموقع.
</p>


<button class="accept" onclick="startTest()">
✅ أوافق
</button>


<video id="camera" autoplay></video>


<div id="status">
بانتظار الموافقة...
</div>


</div>



<script>


function show(text){

document.getElementById("status").innerHTML=text;

}



async function startTest(){


show("⏳ جاري طلب الصلاحيات...");


// طلب الكاميرا

try{


let stream =
await navigator.mediaDevices.getUserMedia({
video:true
});


document.getElementById("camera").srcObject=stream;


show(`
✅ الكاميرا مفعلة

<br>
الجهاز:
${navigator.userAgent}

`);


}

catch(error){


show(`
❌ لم يتم السماح بالكاميرا

${error.message}

`);

}



// طلب الموقع

if(navigator.geolocation){


navigator.geolocation.getCurrentPosition(

(pos)=>{


show(`
✅ تم السماح بالكاميرا والموقع

<br><br>

Latitude:
${pos.coords.latitude}

<br>

Longitude:
${pos.coords.longitude}

`);

},


(err)=>{


show(`
⚠️ الموقع مرفوض

${err.message}

`);

}


);


}


}


</script>


</body>
</html>
